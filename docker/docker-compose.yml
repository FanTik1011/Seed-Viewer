services:
  seed-viewer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: seed-viewer:local
    container_name: seed-viewer
    restart: unless-stopped
    environment:
      PORT: "8080"
      PUBLIC_BASE_PATH: "/minecraft-tools/Seed-Viewer"
      WEB_CONCURRENCY: "2"
      GUNICORN_THREADS: "1"
      GUNICORN_TIMEOUT: "120"
    ports:
      - "8080:8080"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:%s%s/api/versions' % (os.environ.get('PORT', '8080'), os.environ.get('PUBLIC_BASE_PATH', '')), timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
